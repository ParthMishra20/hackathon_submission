env_id: support-triage-openenv
name: support-triage-openenv
description: Real-world customer support triage simulation for training and evaluating agentic workflows.
version: 0.1.0
tags:
  - openenv
  - customer-support
  - triage
entrypoint:
  type: http
  base_url: https://superneon-hackathon-submission.hf.space
  endpoints:
    reset: /reset
    step: /step
    state: /state
    grade: /grade
metadata:
  domain: customer-support
  difficulty: easy-medium-hard
  episode_max_steps: 10
  reward_range:
    min: 0.0
    max: 1.0
models:
  action_model: app.models.Action
  observation_model: app.models.Observation
  reward_model: app.models.Reward
tasks:
  - id: easy_refund_policy
    difficulty: easy
    max_steps: 10
    description: "Handle Basic Refund Policy Question"
    grader:
      type: llm
      prompt_template: "Score the support triage performance 0.0 to 1.0 based on correct category, priority and response quality."
  - id: medium_data_export_bug
    difficulty: medium
    max_steps: 10
    description: "Triage Data Export Failure"
    grader:
      type: llm
      prompt_template: "Score the support triage performance 0.0 to 1.0 based on correct category, priority and escalation."
  - id: hard_security_incident
    difficulty: hard
    max_steps: 10
    description: "Respond to Suspected Account Takeover"
    grader:
      type: llm
      prompt_template: "Score the security incident handling 0.0 to 1.0 based on urgency, escalation and response quality."

additional_endpoints:
  - /metadata
  - /schema
  - /tasks
  - /grade
  - /baseline
