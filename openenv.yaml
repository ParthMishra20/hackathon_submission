env_id: support-triage-openenv
name: support-triage-openenv
description: Real-world customer support triage simulation for training and evaluating agentic workflows.
version: 0.1.0
tags:
  - openenv
  - customer-support
  - triage
entrypoint:
  type: http
  base_url: https://superneon-hackathon-submission.hf.space
  endpoints:
    reset: /reset
    step: /step
    state: /state
    grade: /grade
metadata:
  domain: customer-support
  difficulty: easy-medium-hard
  episode_max_steps: 10
  reward_range:
    min: 0.0
    max: 1.0
models:
  action_model: app.models.Action
  observation_model: app.models.Observation
  reward_model: app.models.Reward
tasks:
  - id: easy_refund_policy
    difficulty: easy
    max_steps: 10
    description: "Handle Basic Refund Policy Question"
    grader: grade/easy_refund_policy
  - id: medium_data_export_bug
    difficulty: medium
    max_steps: 10
    description: "Triage Data Export Failure"
    grader: grade/medium_data_export_bug
  - id: hard_security_incident
    difficulty: hard
    max_steps: 10
    description: "Respond to Suspected Account Takeover"
    grader: grade/hard_security_incident

additional_endpoints:
  - /metadata
  - /schema
  - /tasks
  - /grade
  - /baseline
