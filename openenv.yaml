name: support-triage-openenv
description: Real-world customer support triage simulation for training and evaluating agentic workflows.
version: 0.1.0
tags:
  - openenv
  - customer-support
  - triage
entrypoint:
  type: http
  base_url: http://localhost:7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
metadata:
  domain: customer-support
  difficulty: easy-medium-hard
  episode_max_steps: 10
  reward_range:
    min: 0.0
    max: 1.0
models:
  action_model: app.models.Action
  observation_model: app.models.Observation
  reward_model: app.models.Reward
graders:
  - task_id: easy_refund_policy
    endpoint: /grader?task_id=easy_refund_policy
  - task_id: medium_data_export_bug
    endpoint: /grader?task_id=medium_data_export_bug
  - task_id: hard_security_incident
    endpoint: /grader?task_id=hard_security_incident

additional_endpoints:
  - /metadata
  - /schema
  - /tasks
  - /graders
  - /grader
  - /baseline
